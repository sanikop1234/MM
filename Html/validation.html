<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <h1>User Form</h1>
    <hr>
    <br>
    <form>
        <label for="name">User name:</label>
        <input type="text" id="name" pattern="^[A-Za-z]{2,49}\s[A-Za-z]{1,49}$" required>
        <br><br>
        <label>Phone number:</label>
        <input type="tel" name="Number" pattern="^+[0-9]{1,3}[0-9]{10}$">
        <br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="Password" pattern="^(?=(.*\d){2,})(?=.*[A-Z]{2,})(?=.\[a=z]{2,0})(?=.[\@#$%^&*]{1,})[A_Za-z\d@#$%^&*][12,]$">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" pattern="^[a-z0-9\.%+\-]+@[a-z0-9.-0]+\.[a-z]{2,}$">
        <br><br>
        <button type="submit" value="Submit">Submit</button>
        
    </form>
    
</body>
</html>
