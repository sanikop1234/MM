<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
        }

        h1 {
            text-shadow: 10px 5px 5px aqua;
        }
        .nb {
            width: 100px;
            height: 100px;;
            background-color: aquamarine;
            box-sizing: border-box;
            padding: 10px;
            border: 5px solid red;
            margin: 10px;
        }
        .cb {
            width: 100px;
            height: 100px;;
            background-color: aquamarine;
            box-sizing: content-box;
            padding: 10px;
            border: 5px solid red;
            margin: 10px;
        }
        .bb {
            width: 100px;
            height: 100px;;
            background-color: aquamarine;
            box-sizing: border-box;
            padding: 10px;
            border: 5px solid red;
            margin: 10px;
        }

    </style>
</head>
<body>
    <h1> box Sizing </h1>
    <br>
    <div class="nb">Normal Box</div>
    <div class="cb">Cotent Box</div>
    <div class="bb">Border Box</div>
</body>
</html>
